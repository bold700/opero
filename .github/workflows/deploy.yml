name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechten die de Pages-deploy nodig heeft.
permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; nieuwere pushes mogen een lopende run vervangen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build static export
        env:
          BUILD_TARGET: pages
        run: pnpm build

      # Pages serveert via een echte server (geen Jekyll), maar _next mappen
      # negeert Jekyll standaard, dus zetten we de vlag voor de zekerheid.
      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
